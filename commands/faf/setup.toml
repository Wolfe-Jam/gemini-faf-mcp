description = "Set up FAF project DNA — create or score your .faf file"

prompt = """
Set up FAF project DNA in the current directory. Use FAF MCP tools only.

## What to do

Run `faf_init` with `path` set to `project.faf`.

**If it succeeds** (file created): Run `faf_score` and show the result.
```
Created: project.faf
Score: {score}% ({tier})

Edit project.faf to improve your score.
```

**If it fails** (file already exists): Run `faf_score` on the existing file and show the result.
```
Found: project.faf
Score: {score}% ({tier})
```
If score < 85%, run `faf_validate` and list the errors and warnings.

## Rules

- Run faf_init first. Always. That's the whole command.
- Do not search for .faf files. Do not explore the filesystem.
- Do not ask the user questions. Just do it.
- Use FAF MCP tools only (faf_init, faf_score, faf_validate). Never built-in file tools.
"""
