name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 🧡

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what the bug is
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start gemini-faf-mcp (stdio / Cloud Run)
        2. Call tool ...
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of gemini-faf-mcp? (e.g. `pip show gemini-faf-mcp`)
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: How are you running it?
      options:
        - Local stdio (MCP client)
        - Streamable HTTP / Cloud Run
        - Other
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS + Python version (`python --version`)
      placeholder: "macOS 14 · Python 3.12"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
